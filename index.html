<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lit Components Lab</title>
  <script type="module" src="/src/main.ts"></script>
</head>
<body>
  <h1>Lit Components Lab</h1>
  <section>
    <h2>Counter</h2>
    <lit-counter></lit-counter>
  </section>
  <section>
    <h2>Star Rating</h2>
    <lit-star-rating value="3" max="5"></lit-star-rating>
  </section>
  <section>
    <h2>Todo List</h2>
    <lit-todo-list></lit-todo-list>
  </section>
  <section>
    <h2>User Card</h2>
    <lit-user-card name="Taro Tanaka" role="Frontend Engineer" avatar="👨‍💻"></lit-user-card>
  </section>
</body>
</html>
